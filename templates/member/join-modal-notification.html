<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알림 설정</title>
    <link rel="stylesheet" href="../../static/css/member/join-modal-notification.css">
</head>
<body>
    <div class="join-modal-line1">
        <div class="join-modal-line2">
            <div class="join-modal-line3">
                <div class="join-modal-line4">
                    <div class="join-modal-line5">
                        <div class="join-modal-line6">
                            <div tabindex="0" class="join-modal-line7"></div>
                            <div tabindex="0" class="join-modal">
                                <div class="join-modal-all"></div>
                                <div class="join-modal-box1" aria-modal="true" role="dialog">
                                    <div class="join-modal-box2">
                                        <div class="join-modal-box3">
                                            <div tabindex="0" class="join-modal-in-line-top"></div>
                                            <div tabindex="0" class="join-modal-in">
                                                <div class="join-modal-header">
                                                    <div class="join-modal-header-in1">
                                                        <div class="join-modal-header-in2">
                                                            <div class="join-modal-header-in3">
                                                                <div class="join-modal-header-in4">
                                                                    <div class="join-modal-header-left">
                                                                        <button type="button" aria-label="닫기" class="join-modal-header-close-button">
                                                                            <div class="join-modal-header-close-button-in">
                                                                                <svg viewBox="0 0 24 24" aria-hidden="true" class="X-img">
                                                                                    <g>
                                                                                        <path d="M10.59 12L4.54 5.96l1.42-1.42L12 10.59l6.04-6.05 1.42 1.42L13.41 12l6.05 6.04-1.42 1.42L12 13.41l-6.04 6.05-1.42-1.42L10.59 12z"></path>
                                                                                    </g>
                                                                                </svg>
                                                                            </div>
                                                                        </button>
                                                                    </div>
                                                                    <div class="join-modal-header-middle"></div>
                                                                    <div class="join-modal-header-right"></div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div class="join-modal-main notification-main">
                                                    <div class="notification-icon-wrap">
                                                        <svg viewBox="0 0 24 24" aria-hidden="true" class="notification-icon">
                                                            <g>
                                                                <path d="M20 16H4l1.6-2.1A7.8 7.8 0 0 0 7 9V8a5 5 0 0 1 10 0v1c0 1.8.5 3.5 1.4 4.9L20 16z"></path>
                                                                <path d="M9.5 16a2.5 2.5 0 0 0 5 0"></path>
                                                            </g>
                                                        </svg>
                                                    </div>

                                                    <h1 class="notification-title">알림 켜기</h1>
                                                    <p class="notification-desc">지금 일어나는 일에 대한 소식을 받고 X를 최대한 활용해 보세요.</p>

                                                    <div class="notification-actions">
                                                        <button type="button" class="notification-btn notification-btn-primary js-bounce-btn">알림 허용</button>
                                                        <button type="button" class="notification-btn notification-btn-secondary js-bounce-btn">지금은 넘어가기</button>
                                                    </div>
                                                </div>
                                            </div>
                                            <div tabindex="0" class="join-modal-in-line-bottom"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div tabindex="0" class="join-modal-line7"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../static/js/member/join-modal-notification.js"></script>
</body>
</html>
