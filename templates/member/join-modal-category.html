<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카테고리 선택</title>
    <link rel="stylesheet" href="../../static/css/member/join-modal-category.css">
</head>
<body>
    <div class="join-modal-line1">
        <div class="join-modal-line2">
            <div class="join-modal-line3">
                <div class="join-modal-line4">
                    <div class="join-modal-line5">
                        <div class="join-modal-line6">
                            <div tabindex="0" class="join-modal-line7"></div>
                            <div tabindex="0" class="join-modal">
                                <div class="join-modal-all"></div>
                                <div class="join-modal-box1" aria-modal="true" role="dialog">
                                    <div class="join-modal-box2">
                                        <div class="join-modal-box3">
                                            <div tabindex="0" class="join-modal-in-line-top"></div>
                                            <div tabindex="0" class="join-modal-in">
                                                <div class="join-modal-header">
                                                    <div class="join-modal-header-in1">
                                                        <div class="join-modal-header-in2">
                                                            <div class="join-modal-header-in3">
                                                                <div class="join-modal-header-in4">
                                                                    <div class="join-modal-header-left"></div>
                                                                    <div class="join-modal-header-middle">
                                                                        <svg viewBox="0 0 24 24" aria-hidden="true" class="X-img">
                                                                            <g>
                                                                                <path d="M21.742 21.75l-7.563-11.179 7.056-8.321h-2.456l-5.691 6.714-4.54-6.714H2.359l7.29 10.776L2.25 21.75h2.456l6.035-7.118 4.818 7.118h6.191-.008zM7.739 3.818L18.81 20.182h-2.447L5.29 3.818h2.447z"></path>
                                                                            </g>
                                                                        </svg>
                                                                    </div>
                                                                    <div class="join-modal-header-right"></div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div class="join-modal-main">
                                                    <div class="category-head">
                                                        <h1 class="category-title">X에서 무엇을 찾고 있나요?</h1>
                                                        <p class="category-desc">관심사를 선택해 주세요. 그러면 X에서 관심 있는 내용을 더 많이 볼 수 있도록 맞춤화해 드립니다.</p>
                                                    </div>

                                                    <div class="category-list">
                                                        <button type="button" class="category-item js-category-item">농수산물 및 식품<span class="category-check" aria-hidden="true">✓</span></button>
                                                        <button type="button" class="category-item js-category-item">광물 및 화학제품<span class="category-check" aria-hidden="true">✓</span></button>
                                                        <button type="button" class="category-item js-category-item">섬유 및 의류<span class="category-check" aria-hidden="true">✓</span></button>
                                                        <button type="button" class="category-item js-category-item">금속 및 비금속 제품<span class="category-check" aria-hidden="true">✓</span></button>
                                                        <button type="button" class="category-item js-category-item">기계 및 전자기기<span class="category-check" aria-hidden="true">✓</span></button>
                                                        <button type="button" class="category-item js-category-item">운송장비<span class="category-check" aria-hidden="true">✓</span></button>
                                                        <button type="button" class="category-item js-category-item">정밀 기기 및 가구<span class="category-check" aria-hidden="true">✓</span></button>
                                                        <button type="button" class="category-item js-category-item">종이 및 인쇄물<span class="category-check" aria-hidden="true">✓</span></button>
                                                        <button type="button" class="category-item js-category-item">예술품 및 수집품<span class="category-check" aria-hidden="true">✓</span></button>
                                                        <button type="button" class="category-item js-category-item">플라스틱 및 고무<span class="category-check" aria-hidden="true">✓</span></button>
                                                        <button type="button" class="category-item js-category-item">동식물성 유지<span class="category-check" aria-hidden="true">✓</span></button>
                                                        <button type="button" class="category-item js-category-item">목재<span class="category-check" aria-hidden="true">✓</span></button>
                                                    </div>
                                                </div>

                                                <div class="join-modal-main-under">
                                                    <div class="join-modal-main-under-wrap">
                                                        <div class="join-modal-main-under-wrap-in category-footer">
                                                            <div class="category-status js-category-status">0 개/1 개 선택됨</div>
                                                            <button type="button" class="next-button js-next-button" disabled>다음</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            <div tabindex="0" class="join-modal-in-line-bottom"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div tabindex="0" class="join-modal-line7"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../../static/js/member/join-modal-category.js"></script>
</body>
</html>
