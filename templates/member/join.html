<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="../../static/css/member/join.css">
</head>
<body>
    
    <div class="join-full">
        <div class="join-page">
            <div class="join-page-in1">
                <!-- 여기 4번째 줄이 main 부분이랑 같은 줄 -->
                <div class="join-page-in2">
                    <div class="join-page-in3">
                        <div class="join-page-in4">
                            <div class="join-page-in5">
                                <div class="join-page-in6"></div>
                            </div>
                        </div>
                    </div>
                    <!-- 회원가입 모달 들어갈 부분 -->
                </div>
                <div class="join-main">
                    <!-- main role="main" -->
                    <div class="join-main-page">
                        <div class="join-main-page-wrap">
                            <div class="join-main-page-wrap-in">
                                <div class="join-main-page-content">
                                    <div class="join-main-page-content-right">
                                        <div class="join-main-page-content-right-wrap">
                                            <div class="h1-text">
                                                <span class="h1-text-in">
                                                    지금 일어나고 있는 일
                                                </span>
                                            </div>
                                            <div class="h2-text">
                                                <span class="h2-text-in">지금 가입하세요.</span>
                                            </div>
                                            <div class="join-content">
                                                <button type="button" class="joining">
                                                    <div class="joining-content">
                                                        <div class="joining-content-svg">
                                                            <g>
                                                                <path d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08-.744.9-1.99 1.57-2.987 1.57-.12 0-.23-.02-.3-.03-.01-.06-.04-.22-.04-.39 0-1.15.572-2.27 1.206-2.98.804-.94 2.142-1.64 3.248-1.68.03.13.05.28.05.43zm4.565 15.71c-.03.07-.463 1.58-1.518 3.12-.945 1.34-1.94 2.71-3.43 2.71-1.517 0-1.9-.88-3.63-.88-1.698 0-2.302.91-3.67.91-1.377 0-2.332-1.26-3.428-2.8-1.287-1.82-2.323-4.63-2.323-7.28 0-4.28 2.797-6.55 5.552-6.55 1.448 0 2.675.95 3.6.95.865 0 2.222-1.01 3.902-1.01.613 0 2.886.06 4.374 2.19-.13.09-2.383 1.37-2.383 4.19 0 3.26 2.854 4.42 2.955 4.45z">

                                                                </path>
                                                            </g>
                                                        </div>
                                                        <div class="joining-content-text-wrap">
                                                            <span class="joining-content-text">
                                                                <span class="joining-content-text-in">
                                                                    Apple에서 가입하기
                                                                </span>
                                                            </span>
                                                        </div>
                                                    </div>
                                                </button>
                                                <!-- 또는 -->
                                                <div class="or-text">
                                                    <div class="or-text-in">
                                                        <div class="left-line">
                                                            <div class="left-line-in"></div>
                                                        </div>
                                                        <div class="or">
                                                            <div class="or-content">
                                                                <span class="or-content-in">
                                                                    또는
                                                                </span>
                                                            </div>
                                                        </div> 
                                                        <div class="right-line">
                                                            <div class="right-line-in"></div>
                                                        </div>
                                                    </div>
                                                </div>
                                                <a href="/회원가입" class="a-make-account">
                                                    <div class="make-account">
                                                        <div class="make-account-text-wrap">
                                                            <span class="make-account-text">
                                                                <span class="make-account-text-in">계정 만들기</span>
                                                            </span>
                                                        </div>
                                                    </div>
                                                </a>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="join-main-page-content-left"></div>
                                </div>
                                <div class="join-main-page-footer"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>   
</body>
</html>
