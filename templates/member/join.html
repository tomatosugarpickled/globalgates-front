<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
    <link rel="stylesheet" href="../../static/css/member/join.css">
</head>
<body>
    <main class="join-page" role="main">
        <section class="join-hero" aria-hidden="true">
            <svg viewBox="0 0 24 24" class="join-logo" aria-hidden="true">
                <g>
                    <path d="M21.742 21.75l-7.563-11.179 7.056-8.321h-2.456l-5.691 6.714-4.54-6.714H2.359l7.29 10.776L2.25 21.75h2.456l6.035-7.118 4.818 7.118h6.191-.008zM7.739 3.818L18.81 20.182h-2.447L5.29 3.818h2.447z"></path>
                </g>
            </svg>
        </section>

        <section class="join-panel" aria-label="회원가입 패널">
            <h1 class="join-title">지금 일어나고 있는 일</h1>
            <h2 class="join-subtitle">지금 가입하세요.</h2>

            <div class="join-actions">
                <!-- <button type="button" class="chip-btn chip-google" aria-label="Google로 계속하기">
                    <span class="chip-user">
                        <span class="chip-avatar">한</span>
                        <span class="chip-user-text">
                            <span class="chip-name">한민(으)로 로그인</span>
                            <span class="chip-email">dhkdc@live.com</span>
                        </span>
                    </span>
                    <span class="google-g" aria-hidden="true">G</span>
                </button> -->
                <button type="button" class="chip-btn chip-apple">
                    <span class="apple-mark" aria-hidden="true"></span>
                    Naver에서 가입하기
                </button>
                <button type="button" class="chip-btn chip-apple">
                    <span class="apple-mark" aria-hidden="true"></span>
                    Facebook에서 가입하기
                </button>
                <button type="button" class="chip-btn chip-apple">
                    <span class="apple-mark" aria-hidden="true"></span>
                    Kakao에서 가입하기
                </button>
                
                <div class="join-or" aria-hidden="true">
                    <span class="line"></span>
                    <span class="or-text">또는</span>
                    <span class="line"></span>
                </div>

                <a href="#" class="primary-btn">계정 만들기</a>

                <p class="join-terms">가입하시려면 쿠키 사용을 포함해 이용약관과 개인정보 처리방침에 동의해야 합니다.</p>

                <div class="login-block">
                    <p class="login-title">이미 트위터에 가입하셨나요?</p>
                    <a href="#" class="secondary-btn">로그인</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="join-footer">2026 X Corp.</footer>
</body>
</html>
