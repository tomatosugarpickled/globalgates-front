<div role="group" tabindex="0" class="modal-overlay">
  <div class="modal-mask" data-testid="mask"></div>

  <div
    aria-labelledby="modal-header"
    aria-modal="true"
    role="dialog"
    class="profile-modal"
  >
    <div class="profile-modal__frame">
      <div class="profile-modal__header-bar">
        <button class="icon-button icon-button--close" aria-label="Close">
          <svg viewBox="0 0 24 24" aria-label="X" role="img">
            <g>
              <path
                d="M21.742 21.75l-7.563-11.179 7.056-8.321h-2.456l-5.691 6.714-4.54-6.714H2.359l7.29 10.776L2.25 21.75h2.456l6.035-7.118 4.818 7.118h6.191-.008zM7.739 3.818L18.81 20.182h-2.447L5.29 3.818h2.447z"
              ></path>
            </g>
          </svg>
        </button>
      </div>

      <div class="profile-modal__title">
        <h1 id="modal-header" role="heading" aria-level="1">
          프로필 사진 선택하기
        </h1>
        <p class="profile-modal__subtitle">
          마음에 드는 셀카 사진이 있나요? 지금 업로드하세요.
        </p>
      </div>

      <div class="profile-modal__section">
        <div class="avatar-picker">
          <div class="avatar-frame">
            <div class="avatar-head"></div>
            <div class="avatar-shoulders"></div>

            <label class="avatar-camera" aria-label="사진 업로드">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <g>
                  <path
                    d="M9.697 3H11v2h-.697l-3 2H5c-.276 0-.5.224-.5.5v11c0 .276.224.5.5.5h14c.276 0 .5-.224.5-.5V10h2v8.5c0 1.381-1.119 2.5-2.5 2.5H5c-1.381 0-2.5-1.119-2.5-2.5v-11C2.5 6.119 3.619 5 5 5h1.697l3-2zM12 10.5c-1.105 0-2 .895-2 2s.895 2 2 2 2-.895 2-2-.895-2-2-2zm-4 2c0-2.209 1.791-4 4-4s4 1.791 4 4-1.791 4-4 4-4-1.791-4-4zM17 2c0 1.657-1.343 3-3 3v1c1.657 0 3 1.343 3 3h1c0-1.657 1.343-3 3-3V5c-1.657 0-3-1.343-3-3h-1z"
                  ></path>
                </g>
              </svg>
              <input
                class="avatar-upload"
                type="file"
                accept="image/jpeg,image/png,image/webp"
              />
            </label>
          </div>
        </div>
      </div>

      <div class="profile-modal__section profile-modal__section--actions">
        <button
          type="button"
          class="ghost-button"
          data-testid="ocfSelectAvatarSkipForNowButton"
        >
          지금은 넘어가기
        </button>
      </div>
    </div>
  </div>
</div>
