<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global-Gates</title>
    <link rel="stylesheet" href="../../static/css/chat.css">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <main class="Chat-Main">
        <div class="Chat-Layout">
            <div class="Chat-Wrapper">
                <div class="Chat-Container">
                    <div class="Chat-Contents-Wrapper">
                        <div class="Chat-Contents-Container">

                            <!-- 채팅 좌측 컨탠츠 -->
                            <div class="Chat-UserList-Wrapper">
                                <div class="Chat-UserList-Container">

                                    <!-- 채팅 전문가 목록 헤더 부분 -->
                                    <header class="UserList-Header">
                                       <div class="UserList-Header-Upper">
                                            <div class="Header-Upper-Content">
                                                <div class="Header-Upper-Text">
                                                    Chat
                                                </div>
                                            </div>
                                            <div class="Header-Upper-Button">
                                                <button class="Header-Each-Button Setting">
                                                    <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" data-icon="icon-settings-stroke" viewBox="0 0 24 24" width="1em" height="1em" display="flex" role="img"><path d="M10.54 1.75h2.92l1.57 2.36c.11.17.32.25.53.21l2.53-.59 2.17 2.17-.58 2.54c-.05.2.04.41.21.53l2.36 1.57v2.92l-2.36 1.57c-.17.12-.26.33-.21.53l.58 2.54-2.17 2.17-2.53-.59c-.21-.04-.42.04-.53.21l-1.57 2.36h-2.92l-1.58-2.36c-.11-.17-.32-.25-.52-.21l-2.54.59-2.17-2.17.58-2.54c.05-.2-.03-.41-.21-.53l-2.35-1.57v-2.92L4.1 8.97c.18-.12.26-.33.21-.53L3.73 5.9 5.9 3.73l2.54.59c.2.04.41-.04.52-.21l1.58-2.36zm1.07 2l-.98 1.47C10.05 6.08 9 6.5 7.99 6.27l-1.46-.34-.6.6.33 1.46c.24 1.01-.18 2.07-1.05 2.64l-1.46.98v.78l1.46.98c.87.57 1.29 1.63 1.05 2.64l-.33 1.46.6.6 1.46-.34c1.01-.23 2.06.19 2.64 1.05l.98 1.47h.78l.97-1.47c.58-.86 1.63-1.28 2.65-1.05l1.45.34.61-.6-.34-1.46c-.23-1.01.18-2.07 1.05-2.64l1.47-.98v-.78l-1.47-.98c-.87-.57-1.28-1.63-1.05-2.64l.34-1.46-.61-.6-1.45.34c-1.02.23-2.07-.19-2.65-1.05l-.97-1.47h-.78zM12 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5c.82 0 1.5-.67 1.5-1.5s-.68-1.5-1.5-1.5zM8.5 12c0-1.93 1.56-3.5 3.5-3.5 1.93 0 3.5 1.57 3.5 3.5s-1.57 3.5-3.5 3.5c-1.94 0-3.5-1.57-3.5-3.5z"></path></svg>
                                                </button>
                                                <button class="Header-Each-Button Invite">
                                                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" data-icon="icon-messages-plus-stroke" viewBox="0 0 24 24" width="1em" height="1em" display="flex" role="img"><path fill="currentColor" d="M4.49805 19C4.22205 19 3.99805 18.776 3.99805 18.5V10.462L11.998 14.099L19.998 10.462V13H21.998V5.5C21.998 4.122 20.876 3 19.498 3H4.49805C3.12005 3 1.99805 4.122 1.99805 5.5V18.5C1.99805 19.878 3.12005 21 4.49805 21H11V19H4.49805ZM4.49805 5H19.498C19.774 5 19.998 5.224 19.998 5.5V8.265L11.998 11.902L3.99805 8.265V5.5C3.99805 5.224 4.22205 5 4.49805 5ZM14 18H17V15H19V18H22V20H19V23H17V20H14V18Z"></path></svg>
                                                </button>
                                            </div>
                                       </div> 
                                       <div class="UserList-Header-Bottom">
                                            <div class="Header-SearchBar">
                                                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" data-icon="icon-search-stroke" viewBox="0 0 24 24" width="1em" height="1em" display="flex" role="img" class="h-5 w-5 text-gray-700 shrink-0"><path d="M10.25 3.75c-3.59 0-6.5 2.91-6.5 6.5s2.91 6.5 6.5 6.5c1.795 0 3.419-.726 4.596-1.904 1.178-1.177 1.904-2.801 1.904-4.596 0-3.59-2.91-6.5-6.5-6.5zm-8.5 6.5c0-4.694 3.806-8.5 8.5-8.5s8.5 3.806 8.5 8.5c0 1.986-.682 3.815-1.824 5.262l4.781 4.781-1.414 1.414-4.781-4.781c-1.447 1.142-3.276 1.824-5.262 1.824-4.694 0-8.5-3.806-8.5-8.5z"></path></svg>
                                                <div class="Header-SearchBar-Text">Search</div>
                                            </div>
                                       </div>
                                    </header>

                                    <!-- 채팅 전문가 목록 회원 표시 부분 -->
                                    <div class="UserList-Wrapper" style="height: 100vh; overflow: hidden auto; overflow-anchor: none; width: 100%;">
                                        <ul class="UserList-Container">
                                      
                                            <!-- 유저 정보 하나 -->
                                            <!-------------------------------->
                                            <li class="UserList-EachUser">
                                                <div class="EachUser-Wrapper" style="opacity: 1;">
                                                    <div class="EachUser-UserInfo">
                                                        <div class="UserInfo-Avatar">
                                                            <a class="Avatar-Image">
                                                                <!-- 유저 프로필 이미지 넣는 곳 -->
                                                                <img alt="user-avatar" src="" loading="lazy" draggable="false">
                                                            </a>
                                                        </div>
                                                        <div class="UserInfo-Info">
                                                            <div class="Info-Upper">
                                                                <div class="Info-UserName">
                                                                    <!-- 유저 이름 + 구독 여부 뱃지 -->
                                                                    <a href="해당 유저 마이페이지 경로" style="text-decoration: none;">
                                                                        <div class="UserName-Container">
                                                                            <!-- 유저 이름 부분 -->
                                                                            <div class="UserName-Text">유저 이름</div>
                                                                            <!-- 유저 구독 여부 뱃지 부분 -->
                                                                            <div class="UserName-Badge">
                                                                                <div class="Badge-Wrapper">
                                                                                    <div class="Badge-Svg">
                                                                                        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" data-icon="icon-verified" viewBox="0 0 22 22" width="1em" height="1em" display="flex" role="img" class="fill-badge"><path d="M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.75-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568s-.969.854-1.24 1.44c-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.688-.13.633-.08 1.29.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.574 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.606-.274 1.263-.144 1.896.13.634.433 1.218.877 1.688.47.443 1.054.747 1.687.878.633.132 1.29.084 1.897-.136.274.586.705 1.084 1.246 1.439.54.354 1.17.551 1.816.569.647-.016 1.276-.213 1.817-.567s.972-.854 1.245-1.44c.604.239 1.266.296 1.903.164.636-.132 1.22-.447 1.68-.907.46-.46.776-1.044.908-1.681s.075-1.299-.165-1.903c.586-.274 1.084-.705 1.439-1.246.354-.54.551-1.17.569-1.816zM9.662 14.85l-3.429-3.428 1.293-1.302 2.072 2.072 4.4-4.794 1.347 1.246z"></path></svg>
                                                                                    </div>
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                    </a>
                                                                </div>
                                                                <!-- 채팅이 올라온 최근 시간 부분 -->
                                                                <div class="Lastest-ChatTime">
                                                                    <div class="Lastest-ChatTime-Text">2일 전</div>
                                                                </div>
                                                            </div>
                                                            <!-- 최근 올라온 채팅 내용 부분 -->
                                                            <div class="Info-Bottom">
                                                                <div class="Talk-Wrapper">
                                                                    <div class="Talk-Container">
                                                                        <!-- 채팅 내용 span -->
                                                                        <span class="Talk-Content">
                                                                            채팅 내용 입력하는 곳
                                                                        </span>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </li>
                                            <!-------------------------------->
                                            <!-------------------------------->
                                            <li class="UserList-EachUser">
                                                <div class="EachUser-Wrapper" style="opacity: 1;">
                                                    <div class="EachUser-UserInfo">
                                                        <div class="UserInfo-Avatar">
                                                            <a class="Avatar-Image">
                                                                <!-- 유저 프로필 이미지 넣는 곳 -->
                                                                <img alt="user-avatar" src="" loading="lazy" draggable="false">
                                                            </a>
                                                        </div>
                                                        <div class="UserInfo-Info">
                                                            <div class="Info-Upper">
                                                                <div class="Info-UserName">
                                                                    <!-- 유저 이름 + 구독 여부 뱃지 -->
                                                                    <a href="해당 유저 마이페이지 경로" style="text-decoration: none;">
                                                                        <div class="UserName-Container">
                                                                            <!-- 유저 이름 부분 -->
                                                                            <div class="UserName-Text">유저 이름</div>
                                                                            <!-- 유저 구독 여부 뱃지 부분 -->
                                                                            <div class="UserName-Badge">
                                                                                <div class="Badge-Wrapper">
                                                                                    <div class="Badge-Svg">
                                                                                        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" data-icon="icon-verified" viewBox="0 0 22 22" width="1em" height="1em" display="flex" role="img" class="fill-badge"><path d="M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.75-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568s-.969.854-1.24 1.44c-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.688-.13.633-.08 1.29.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.574 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.606-.274 1.263-.144 1.896.13.634.433 1.218.877 1.688.47.443 1.054.747 1.687.878.633.132 1.29.084 1.897-.136.274.586.705 1.084 1.246 1.439.54.354 1.17.551 1.816.569.647-.016 1.276-.213 1.817-.567s.972-.854 1.245-1.44c.604.239 1.266.296 1.903.164.636-.132 1.22-.447 1.68-.907.46-.46.776-1.044.908-1.681s.075-1.299-.165-1.903c.586-.274 1.084-.705 1.439-1.246.354-.54.551-1.17.569-1.816zM9.662 14.85l-3.429-3.428 1.293-1.302 2.072 2.072 4.4-4.794 1.347 1.246z"></path></svg>
                                                                                    </div>
                                                                                </div>
                                                                            </div>
                                                                        </div>
                                                                    </a>
                                                                </div>
                                                                <!-- 채팅이 올라온 최근 시간 부분 -->
                                                                <div class="Lastest-ChatTime">
                                                                    <div class="Lastest-ChatTime-Text">2일 전</div>
                                                                </div>
                                                            </div>
                                                            <!-- 최근 올라온 채팅 내용 부분 -->
                                                            <div class="Info-Bottom">
                                                                <div class="Talk-Wrapper">
                                                                    <div class="Talk-Container">
                                                                        <!-- 채팅 내용 span -->
                                                                        <span class="Talk-Content">
                                                                            채팅 내용 입력하는 곳
                                                                        </span>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            </li>
                                            <!-------------------------------->
                                        </ul>
                                    </div>
                                </div>
                            </div>

                            <!-- 채팅 우측 컨탠츠 -->
                            <div class="Chat-ChatContent">
                                <!-- 채팅 생성 div -->
                                <div class="ChatContent-Wrapper">
                                    <div class="ChatContent-Icon">
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" data-icon="icon-messages-stroke" viewBox="0 0 24 24" width="1em" height="1em" display="flex" role="img"><path d="M1.998 5.5c0-1.381 1.119-2.5 2.5-2.5h15c1.381 0 2.5 1.119 2.5 2.5v13c0 1.381-1.119 2.5-2.5 2.5h-15c-1.381 0-2.5-1.119-2.5-2.5v-13zm2.5-.5c-.276 0-.5.224-.5.5v2.764l8 3.638 8-3.636V5.5c0-.276-.224-.5-.5-.5h-15zm15.5 5.463l-8 3.636-8-3.638V18.5c0 .276.224.5.5.5h15c.276 0 .5-.224.5-.5v-8.037z"></path></svg>
                                    </div>
                                    <div class="ChatContent-Texts">
                                        <div class="Upper-Text">상담 시작하기</div>
                                        <div class="Bottom-Text">계약 체결에 앞서, 전문가와의 상담으로 계약을 보다 순조롭게 이끌어가세요.</div>
                                    </div>
                                    <button class="ChatContent-Button">
                                        <div class="ChatContent-Button-Text">상담 받기</div>                                        </div>
                                    </button>
                                </div>

                                <!-- 채팅방 div -->
                                <div class="ChatPage-Wrapper">

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 모달용 백드롭 -->
        <div class="Modal-BackDrop" style="pointer-events: auto;"></div>
        <!-- 전문가 검색 모달 -->
        <div class="Search-Modal">

        </div>
    </main>
</body>
<script src="../../static/js/chat/event.js"></script>
</html>
